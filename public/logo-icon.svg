<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="coin" x1="25" y1="22" x2="75" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle glint lines top-left -->
  <line x1="14" y1="10" x2="28" y2="10" stroke="white" stroke-width="1.2" stroke-opacity="0.12" stroke-linecap="round"/>
  <line x1="10" y1="15" x2="18" y2="15" stroke="white" stroke-width="1" stroke-opacity="0.08" stroke-linecap="round"/>

  <!-- Coin drop shadow -->
  <circle cx="50" cy="53" r="32" fill="#000" fill-opacity="0.22"/>

  <!-- Main coin -->
  <circle cx="50" cy="50" r="32" fill="url(#coin)"/>

  <!-- Coin milled edge (inner ring) -->
  <circle cx="50" cy="50" r="28.5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.28"/>

  <!-- Bold "R" — the Reise initial -->
  <text
    x="50" y="68"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    fill="white"
    fill-opacity="0.93"
    letter-spacing="-1"
  >R</text>

  <!-- Three small route dots at bottom — departure · · · arrival -->
  <circle cx="24" cy="88" r="2.5" fill="white" fill-opacity="0.35"/>
  <circle cx="50" cy="88" r="1.8" fill="white" fill-opacity="0.22"/>
  <circle cx="76" cy="88" r="2.5" fill="white" fill-opacity="0.35"/>
</svg>
