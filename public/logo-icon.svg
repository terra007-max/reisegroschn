<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Dark background like Kairos, but with a subtle teal-indigo depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f1e2e"/>
    </linearGradient>
    <!-- Subtle inner glow for depth -->
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square (same radius language as Kairos) -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#glow)"/>

  <!-- Subtle top-right specular glint -->
  <ellipse cx="72" cy="18" rx="18" ry="8" fill="white" fill-opacity="0.04" transform="rotate(-30 72 18)"/>

  <!-- The "E" — clean, geometric, slightly condensed like Kairos K -->
  <!-- Vertical stroke -->
  <rect x="30" y="24" width="8" height="52" rx="2" fill="white"/>
  <!-- Top horizontal -->
  <rect x="30" y="24" width="36" height="8" rx="2" fill="white"/>
  <!-- Middle horizontal (slightly shorter — gives elegant asymmetry) -->
  <rect x="30" y="46" width="30" height="7" rx="2" fill="white"/>
  <!-- Bottom horizontal -->
  <rect x="30" y="68" width="36" height="8" rx="2" fill="white"/>

  <!-- Route dot accent — three dots bottom-right suggesting a journey path -->
  <circle cx="74" cy="83" r="2.2" fill="white" fill-opacity="0.22"/>
  <circle cx="80" cy="83" r="2.2" fill="white" fill-opacity="0.14"/>
  <circle cx="86" cy="83" r="2.2" fill="white" fill-opacity="0.08"/>
</svg>
